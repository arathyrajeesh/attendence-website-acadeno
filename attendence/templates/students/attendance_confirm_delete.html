{% extends 'base.html' %}
{% block title %}Delete Attendance — AMS{% endblock %}

{% block content %}
<div class="delete-wrap">
    <div class="card">
        <div class="card-title">Delete attendance record</div>
        <p style="color: var(--text-muted); font-size:13px; margin-bottom:20px;">
            Are you sure you want to delete the record for
            <strong style="color:var(--text);">{{ object.student.name }}</strong>
            on <strong style="color:var(--text);">{{ object.date|date:"d M Y" }}</strong>?
        </p>
        <form method="post" style="display:flex; gap:8px;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger-outline">Delete</button>
            <a href="{% url 'attendance-list' %}" class="btn btn-ghost">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
